<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <title>Talk To A Cat</title>
    <meta name="description content=Cat that talks in morse code">

    
    <style>

    /*same way of rendering size for everything*/
    * {
        box-sizing: border-box;
    }

    /* Change all sizes px -> % later */

    body {
        background-color: #f5f5f5;
    }

    .Header { 
        /*Dimentions+Color*/
        font-size: 32px;
        width: 100%;
        height: 50px;
        background: white;
        color:palevioletred;

        /*Attaches button placement to screen*/
        position: fixed;
        top: 0px;
        left: 0px;
        
        display: flex;
        justify-content: center;
        align-items: center;
        /*lifts the z axis of the object*/
        z-index: 10;
    }

    .SendButton {
        /*Dimentions+Color*/
        font-size: calc(30px * var(--Multi));
        width: calc(50px * var(--Multi));
        height: calc(50px * var(--Multi));
        border-radius: 10px;
        background: #d87093;
        color:white;

        /*Center Text: the first line trigers aligne commands
        the 2 others are the align commandes on both axis*/
        display: flex;
        justify-content: center;
        align-items: center;

        z-index: 10;
        
        /*Attaches button placement to screen*/
        position: fixed;
        bottom: 20px;
        right: 20px;
    }

    .TextBox {
        /* Dimensions + color*/
        width: calc((1px * var(--Width)) - (50px * var(--Multi)) - 60px);
        height: calc(50px * var(--Multi));
        font-size: 20px;
        border-radius: 10px;
        padding: 10px;
        border: 2px solid palevioletred;
        color: palevioletred;

        /*Attaches TextBox placement to screen*/
        position: fixed;
        bottom: 20px;
        left: 20px;

        z-index: 10;
    }

    .TextBox::placeholder {
        color: palevioletred;
        opacity: 0.7; /* makes it slightly faded until typed in */
    }

    .TextBox:focus { /*when using textbox*/
        outline: none; /* Removes the default browser ring entirely */
        border-color: palevioletred;
    }

    .ChatLog {/*A parent objet*/
        /* Cutoffs and scolability*/
        margin-top: 50px;
        margin-bottom: 50px;
        height: calc(100vh - 100px);
        overflow-y: auto;
        &::-webkit-scrollbar {
            display: none;
        }
        position: relative;

        display: flex;
        flex-direction: column; /*stacks to messages*/
        gap: 10px;

        
    }
    
    .MyMessage { 
        /*Dimentions+Color*/
        min-width: 30px;
        max-width: 80%;
        border-radius: 10px;
        padding: 10px;
        background-color: palevioletred;
        color: white;

        /*shifts twords the right*/
        align-self: flex-end;
        margin-right: 20px;

        /*adds row if long messages surpase box dimentions*/
        word-wrap: break-word;

        position: relative; /* anchors pseudo-elements, basicly child objects*/
    }

    .CatMessage {
        /*Dimentions+Color*/
        min-width: 30px;
        max-width: 80%;
        border-radius: 10px;
        padding: 10px;
        background-color: #ffc0cb;
        color: white;

        /*shifts twords the left*/
        align-self: flex-start;
        margin-left: 20px;

        /*adds row if long messages surpase box dimentions*/
        word-wrap: break-word;

        position: relative;
    }

    .MyMessage::before {/* its child*/
        /*tape*/
        content: ""; 
        position: absolute;

        /*position relative to parent*/
        bottom: -52px;
        right: 0px;

        /*makes circle */
        width: 40px;
        height: 40px;
        border-radius: 50%;

        /*imports and centers and scales a picture from the net*/
        background-image: url('Talk_To_A_Cat/TTAC_FrontEnd/User.png');
        background-position: center;
        background-size: cover;
    }

    .CatMessage::before {
        content: ""; 
        position: absolute;

        bottom: -52px;
        left: 0px;

        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: white;

        background-image: url('Talk_To_A_Cat/TTAC_FrontEnd/Cat.png');
        background-position: center;
        background-size: cover;
    }

    .MyMessage::after {
        content: ""; 
        position: absolute;

        bottom: -8px;
        right: 10px;

        /*makes a triangle using border joints*/
        width: 0;
        height: 0;
        border-left: 4px solid transparent;
        border-top: 8px solid palevioletred;
        border-right: 4px solid transparent;
    }

    .CatMessage::after {
        content: ""; 
        position: absolute;

        bottom: -8px;
        left: 10px;

        width: 0;
        height: 0;
        border-left: 4px solid transparent;
        border-top: 8px solid pink;
        border-right: 4px solid transparent;
    }

    </style>

</head>


<body>

    <div class="Header">Talk To A Cat !</div> 
    
    <input type="text" class="TextBox" placeholder="Type here...">

    <div class="SendButton">➔</div>

    <div class="ChatLog"></div> 

    <script>// calculating multipliers for objects according to screen size
        function Resize() {
        // gets num of pixels in width  of the screen
        let ScreenWidth = window.innerWidth;

        // Applies multi to a css var
        document.documentElement.style.setProperty('--Width', ScreenWidth);

        // Calculates the multi
        let Multi = ScreenWidth / 1000;

        // Applies multi to a css var
        document.documentElement.style.setProperty('--Multi', Multi);
        }

        Resize();

        //runs every time the window gets resied
        window.addEventListener('resize', Resize)
    </script>

    <script src="Behavior.js"></script>


</body>

</html>
